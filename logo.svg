<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 195">
  <defs>
    <!-- Gold gradient for the three E bars -->
    <linearGradient id="gBar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FBE98A"/>
      <stop offset="25%"  stop-color="#E8C040"/>
      <stop offset="60%"  stop-color="#C89820"/>
      <stop offset="100%" stop-color="#A07818"/>
    </linearGradient>
    <linearGradient id="gBar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5E078"/>
      <stop offset="25%"  stop-color="#E0B830"/>
      <stop offset="60%"  stop-color="#C09018"/>
      <stop offset="100%" stop-color="#987010"/>
    </linearGradient>
    <linearGradient id="gBar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#EDD868"/>
      <stop offset="25%"  stop-color="#D8B028"/>
      <stop offset="60%"  stop-color="#B88810"/>
      <stop offset="100%" stop-color="#8E6808"/>
    </linearGradient>
    <!-- Gold gradient for ECHELON text -->
    <linearGradient id="gText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F5DF78"/>
      <stop offset="40%"  stop-color="#D4A820"/>
      <stop offset="100%" stop-color="#906808"/>
    </linearGradient>
    <!-- Subtle sheen overlay on bars -->
    <linearGradient id="gSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.22"/>
      <stop offset="45%"  stop-color="white" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Bar 1 (top) ── -->
  <path d="M 84,18  L 226,18  L 219,41  L 77,41  Z" fill="url(#gBar1)"/>
  <path d="M 84,18  L 226,18  L 219,41  L 77,41  Z" fill="url(#gSheen)"/>

  <!-- ── Bar 2 (middle) ── -->
  <path d="M 80,52  L 222,52  L 215,75  L 73,75  Z" fill="url(#gBar2)"/>
  <path d="M 80,52  L 222,52  L 215,75  L 73,75  Z" fill="url(#gSheen)"/>

  <!-- ── Bar 3 (bottom) ── -->
  <path d="M 76,86  L 218,86  L 211,109 L 69,109 Z" fill="url(#gBar3)"/>
  <path d="M 76,86  L 218,86  L 211,109 L 69,109 Z" fill="url(#gSheen)"/>

  <!-- ── ECHELON ── -->
  <text
    x="150" y="142"
    text-anchor="middle"
    fill="url(#gText)"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="29"
    font-weight="700"
    letter-spacing="9"
  >ECHELON</text>

  <!-- ── Decorative lines ── -->
  <line x1="28"  y1="161" x2="70"  y2="161" stroke="#787878" stroke-width="0.9"/>
  <line x1="230" y1="161" x2="272" y2="161" stroke="#787878" stroke-width="0.9"/>

  <!-- ── RENTAL GROUP ── -->
  <text
    x="150" y="165"
    text-anchor="middle"
    fill="#A0A0A8"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="5"
  >RENTAL GROUP</text>
</svg>
